services:
  swagger-ui:
    image: swaggerapi/swagger-ui:latest
    container_name: registrar-api-swagger-ui
    ports:
      - "8081:8080"
    environment:
      SWAGGER_JSON: /spec/openapi.yaml
    volumes:
      - ./registrar-public-read-api.openapi.yaml:/spec/openapi.yaml:ro
    restart: unless-stopped
